---
layout: default
---

<article class="page-content post-page">
  <header class="post-header">
    <a class="post-back-link" href="{{ '/blog' | relative_url }}">&#8592; back to blog</a>
    <h1 class="page-title post-title">{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
